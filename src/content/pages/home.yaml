title: Home
description: this is about us woop
content:
  - discriminant: hero
    value:
      image: src/assets/images/hero/home/content/0/value/image.png
      title: Reclaim Your Weekend From Your Overgrown Garden
      description: >-
        Tired of spending every Sunday weeding, watering, and fixing old retic?
        We transform tired Perth gardens and outdoor spaces into modern,
        low-maintenance sanctuaries you can actually enjoy.
      cta:
        - discriminant: internalLink
          value:
            link: about-us
            linkText: Book a Consultation
        - discriminant: internalLink
          value:
            link: home
            linkText: See Before & Afters
  - discriminant: textWithImage
    value:
      image: src/assets/images/home/content/1/value/image.jpg
      title: Is your backyard a place you try to hide?
      description: >-
        You love your home, but the garden has gotten away from you. Maybe it’s
        the cracked pavers, the thirsty lawn, or the "jungle" of weeds. You want
        to entertain outside, but you’re embarrassed by the mess. You know it
        needs a full overhaul, but the thought of doing it yourself is
        overwhelming.
      tagline: Tired of the Jungle?
      cta: []
      imageSide: right
  - discriminant: textWithImage
    value:
      image: src/assets/images/home/content/2/value/image.jpg
      title: Garden transformation specialists who actually show up.
      description: >-
        Leedstone Landscaping was built to handle the jobs others put in the
        "too hard" basket. While many landscapers chase easy new builds, we
        specialize in complex garden rescues and makeovers. We handle the heavy
        lifting, the demolition, and the project management so you don't have
        to. We are the team that quotes, turns up, and gets it done.
      tagline: Meet The Leedstone Landscaping Team
      cta: []
      imageSide: left
  - discriminant: featuresBlock
    value:
      title: Give your outdoor space a new lease on life
      description: We turn high-maintenance burdens into assets.
      tagline: 'The Smart Choice. '
      cta: []
      feature:
        - image: src/assets/images/home/content/3/value/feature/0/image.jpg
          title: We turn high-maintenance burdens into assets.
          description: >-
            We replace thirsty, outdated lawns with waterwise native options and
            smart retic that thrive in the heat with minimal effort.
        - image: src/assets/images/home/content/3/value/feature/1/image.jpg
          title: We Handle The Demolition
          description: >-
            Don't worry about hiring skips. We rip out the old roots, remove the
            rubble, and clear the site completely before we start building.
        - image: src/assets/images/home/content/3/value/feature/2/image.jpg
          title: Add Instant Value
          description: >-
            A tired garden drags down your property price. We design modern
            alfresco spaces and limestone features that immediately boost curb
            appeal.
  - discriminant: textWithImage
    value:
      image: src/assets/images/home/content/4/value/image.jpg
      title: Areas Serviced
      description: We take on jobs in these locations
      cta:
        - discriminant: externalLink
          value:
            link: https://jpittard.net
            linkText: Book a call
      imageSide: right
  - discriminant: timeline
    value:
      title: The Transformation Process
      description: From quote to cleanup in three simple steps.
      tagline: How It Works.
      cta:
        - discriminant: internalLink
          value:
            link: all-the-things
            linkText: Book a consultation
        - discriminant: externalLink
          value:
            link: https://jpittard.net
            linkText: 'See our work. '
      items:
        - title: The Assessment
          description: >-
            We visit to check your soil, assess site access, and listen to what
            you hate about the current space so we can design what you love.
        - title: The Strip-Out
          description: >-
            The messy part. We arrive with the machinery to remove the old turf,
            stumps, and debris. We keep the site as tidy as possible while we
            work.
        - title: The Makeover
          description: >-
            We install the new hardscaping, fresh soil, and plants, leaving you
            with a finished, polished space ready for the weekend BBQ.
  - discriminant: reviews
    value:
      title: Local Success Stories.
      reviews:
        - our-backyard-was-a-20-year-old-jungle
        - it-looks-like-a-brand-new-house
  - discriminant: cta
    value:
      title: Ready to love your garden again?
      cta:
        - discriminant: internalLink
          value:
            link: home
            linkText: Get Your Transformation Quote
  - discriminant: faqBlock
    value:
      title: Frequently asked questions
      description: >-
        We know a full garden overhaul feels like a big, disruptive job. Here is
        how we handle the "hard stuff"—from narrow side gates to protecting your
        driveway—so you don't have to stress.
      faqs: []
      followUpTitle: Still have a questions?
      followUpDescription: Support details to capture customers that might be on the fence.
      cta:
        - discriminant: internalLink
          value:
            link: contact-us
            linkText: Contact
        - discriminant: externalLink
          value:
            link: https://jpittard.net
            linkText: button
  - discriminant: contactBlock
    value:
      title: Get in Touch
      description: Reach out to us through any of these convenient methods
      tagline: Contact Information
      cta: []
